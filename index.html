<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-download"></i> Download Manager</h1>
            <p class="subtitle">Browse folders & download files directly</p>
        </header>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search files or folders..." />
        </div>

        <div id="foldersContainer" class="folders">
            <div class="loading">
                <i class="fas fa-spinner fa-pulse"></i>
                Loading data...
            </div>
        </div>

        <div class="files-box">
            <h2 id="folderTitle">Select a folder</h2>
            <div id="filesList">
                <div class="empty">Loading folders...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
